server {
    server_name barrens.hilberthiggs.com;

    # Landing page
    root /home/barrens/data-barrens/deploy/landing;
    index index.html;

    # Static landing page for /
    location = / {
        try_files /index.html =404;
    }

    # Register — strict: 1/min/IP (burst 2)
    location = /api/player/register {
        limit_req zone=api_register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:19820;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Write endpoints — 20/min/IP
    location ~ ^/api/(battle|explore|equipment/merge|skill/equip) {
        limit_req zone=api_write burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:19820;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — 30/min/IP
    location /api/ {
        limit_req zone=api_general burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:19820;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/barrens.hilberthiggs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barrens.hilberthiggs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = barrens.hilberthiggs.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name barrens.hilberthiggs.com;
    return 404;
}
